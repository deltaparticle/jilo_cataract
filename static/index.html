<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cataract Diagnostics AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.7);
            --border-color: rgba(240, 246, 252, 0.1);
            --primary-accent: #58a6ff;
            --success-color: #2ea44f;
            --warning-color: #f78166;
            --text-main: #f0f6fc;
            --text-secondary: #8b949e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 10% 20%, rgba(88, 166, 255, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(247, 129, 102, 0.03) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #58a6ff, #1f6feb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .upload-area {
            border: 2px dashed rgba(88, 166, 255, 0.4);
            border-radius: 15px;
            padding: 40px 20px;
            cursor: pointer;
            position: relative;
            background: rgba(22, 27, 34, 0.4);
            transition: border-color 0.3s, background 0.3s;
        }

        .upload-area:hover, .upload-area.drag-over {
            border-color: var(--primary-accent);
            background: rgba(88, 166, 255, 0.05);
        }

        .upload-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            display: block;
        }

        .upload-text {
            color: var(--text-main);
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .upload-subtext {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        #file-input {
            display: none;
        }

        .preview-container {
            margin-top: 25px;
            display: none;
            justify-content: center;
        }

        .preview-img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .btn {
            background: linear-gradient(135deg, #238636 0%, #2ea44f 100%);
            border: none;
            color: white;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 25px;
            width: 100%;
            transition: transform 0.2s, opacity 0.2s;
            box-shadow: 0 4px 15px rgba(46, 164, 79, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Results & Loading animation Styles */
        .loading {
            display: none;
            margin-top: 25px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(88, 166, 255, 0.2);
            border-radius: 50%;
            border-top-color: var(--primary-accent);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-card {
            display: none;
            margin-top: 30px;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
            text-align: left;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .status-normal {
            background-color: rgba(46, 164, 79, 0.2);
            color: #56d364;
            border: 1px solid rgba(46, 164, 79, 0.4);
        }

        .status-cataract {
            background-color: rgba(247, 129, 102, 0.2);
            color: #ff7b72;
            border: 1px solid rgba(247, 129, 102, 0.4);
        }

        .probability-bar-container {
            margin-top: 15px;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .bar-track {
            height: 10px;
            width: 100%;
            background-color: #21262d;
            border-radius: 5px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.8s cubic-bezier(0.1, 0.8, 0.3, 1);
        }

        .normal-fill { background-color: var(--success-color); }
        .cataract-fill { background-color: var(--warning-color); }
    </style>
</head>
<body>

<div class="container">
    <h1>Cataract Diagnostics AI</h1>
    <p class="subtitle">Upload a close-up image of the eye for real-time model analysis.</p>

    <div class="card">
        <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <span class="upload-icon">👁️</span>
            <p class="upload-text">Drag & Drop eye image here or click to browse</p>
            <p class="upload-subtext">Supports PNG, JPG, or JPEG formats</p>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <div class="preview-container" id="preview-container">
            <img src="" alt="Eye Preview" class="preview-img" id="preview-img">
        </div>

        <button class="btn" id="scan-btn" style="display: none;" onclick="analyzeImage()">Analyze Scan</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: var(--text-secondary)">Running QAT DINOv2 + SVM pipeline...</p>
        </div>

        <div class="result-card" id="result-card">
            <div class="result-header">
                <h3>Analysis Results</h3>
                <span class="status-badge" id="result-badge"></span>
            </div>
            
            <p style="color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 20px;">
                Confidence: <strong id="result-confidence" style="color: var(--text-main)"></strong>
            </p>

            <div class="probability-bar-container">
                <div class="bar-label">
                    <span>Normal Score</span>
                    <span id="normal-percent">0%</span>
                </div>
                <div class="bar-track">
                    <div class="bar-fill normal-fill" id="normal-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="probability-bar-container" style="margin-top: 20px;">
                <div class="bar-label">
                    <span>Cataract Score</span>
                    <span id="cataract-percent">0%</span>
                </div>
                <div class="bar-track">
                    <div class="bar-fill cataract-fill" id="cataract-bar" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const previewContainer = document.getElementById('preview-container');
    const previewImg = document.getElementById('preview-img');
    const scanBtn = document.getElementById('scan-btn');
    const loading = document.getElementById('loading');
    const resultCard = document.getElementById('result-card');
    
    let selectedFile = null;

    // Handle Drag & Drop events
    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
        }, false);
    });

    dropZone.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        if(files.length > 0) handleFile(files[0]);
    });

    fileInput.addEventListener('change', (e) => {
        if(e.target.files.length > 0) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
        if (!file.type.startsWith('image/')) {
            alert('Please drop an image file.');
            return;
        }
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = function(e) {
            previewImg.src = e.target.result;
            previewContainer.style.display = 'flex';
            scanBtn.style.display = 'block';
            resultCard.style.display = 'none';
        }
        reader.readAsDataURL(file);
    }

    async function analyzeImage() {
        if (!selectedFile) return;

        scanBtn.style.display = 'none';
        resultCard.style.display = 'none';
        loading.style.display = 'block';

        const formData = new FormData();
        formData.append('file', selectedFile);

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error('API server responded with error');
            const data = await response.json();
            
            loading.style.display = 'none';
            resultCard.style.display = 'block';

            // Update badge UI
            const badge = document.getElementById('result-badge');
            badge.innerText = data.prediction;
            if (data.prediction === 'Normal') {
                badge.className = 'status-badge status-normal';
            } else {
                badge.className = 'status-badge status-cataract';
            }

            document.getElementById('result-confidence').innerText = data.confidence;
            
            // Set percents and bars
            const normalPercent = (data.probabilities.Normal * 100).toFixed(1) + '%';
            const cataractPercent = (data.probabilities.Cataract * 100).toFixed(1) + '%';
            
            document.getElementById('normal-percent').innerText = normalPercent;
            document.getElementById('cataract-percent').innerText = cataractPercent;

            setTimeout(() => {
                document.getElementById('normal-bar').style.width = normalPercent;
                document.getElementById('cataract-bar').style.width = cataractPercent;
            }, 50);

        } catch (error) {
            loading.style.display = 'none';
            scanBtn.style.display = 'block';
            alert('Prediction failed: ' + error.message);
        }
    }
</script>
</body>
</html>
